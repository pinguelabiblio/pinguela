<!DOCTYPE html>
<html lang="gl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca do IES A Pinguela</title>
    <link rel="icon" type="image/png" href="imaxes/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <!--
    ============================================================
    index.html — WEB DA BIBLIOTECA DO IES A PINGUELA
    ============================================================
    Arquivo principal da web pública da biblioteca.
    É unha Single Page Application (SPA) que carga todo o
    contido de forma dinámica a partir de 3 ficheiros CSV:
      - datos/configuracion.csv → configuración xeral (ticker, hero)
      - datos/contido.csv       → libros e eventos
      - datos/seccions.csv      → seccións da páxina e filtros

    Arquitectura:
      1. O servidor Express (server.js) serve os CSVs via REST
      2. O HTML carga <style> en liña (sen CSS externo) para
         funcionar sen dependencias extra
      3. O JS parsea os CSV, constrúe o DOM dinamicamente e
        xestiona interaccións (modais, acordeón, carrusel, tema)

    Tema visual: modo claro/escuro con CSS custom properties.
    Tipografía: Inter (sans) + Playfair Display (serif).
    ============================================================
    -->
    <style>
        /* ========================================================
           VARIABLES CSS (modo claro)
           ======================================================== */
        :root {
            --bg-principal: #fcfcfb;
            --bg-superficie: #ffffff;
            --bg-superficie-hover: #f5f3f1;
            --primaria: #7b1c2e;
            --primaria-hover: #5e1322;
            --secundaria: #c29b62;
            --coral: #e07a5f;
            --cor-texto: #1a1617;
            --cor-texto-mutado: #61595a;
            --cor-texto-fino: #756e6f;
            --radius-baixo: 4px;
            --radius-medio: 8px;
            --radius-pill: 99px;
            --bordo-fino: 1px solid rgba(26, 22, 23, 0.08);
            --bordo-hover: rgba(123, 28, 46, 0.3);
            --sombra-card: 0 4px 12px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
            --sombra-card-hover: 0 12px 24px rgba(0, 0, 0, 0.08), 0 4px 8px rgba(0, 0, 0, 0.03);
            --sombra-flotante: 0 20px 40px rgba(0, 0, 0, 0.06);
            --transicion: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ========================================================
           VARIABLES CSS (modo escuro)
           ======================================================== */
        [data-theme="dark"] {
            --bg-principal: #121011;
            --bg-superficie: #1a1718;
            --bg-superficie-hover: #242021;
            --cor-texto: #f0ecec;
            --cor-texto-mutado: #aba2a4;
            --cor-texto-fino: #756e6f;
            --primaria: #e04a62;
            --primaria-hover: #f06a80;
            --secundaria: #dcb37b;
            --coral: #ff8e72;
            --bordo-fino: 1px solid rgba(240, 236, 236, 0.08);
            --bordo-hover: rgba(224, 74, 98, 0.4);
            --sombra-card: 0 4px 12px rgba(0, 0, 0, 0.4);
            --sombra-card-hover: 0 12px 24px rgba(0, 0, 0, 0.6);
            --sombra-flotante: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* ========================================================
           RESET E ESTILOS BASE
           ======================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-principal);
            color: var(--cor-texto);
            line-height: 1.5;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
        }

        @keyframes efemeride-aparecer {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .efemeride {
            animation: efemeride-aparecer 0.6s cubic-bezier(0.25,1,0.5,1) both;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }
        .efemeride:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.08);
        }
        .efemeride:nth-child(2) { animation-delay: 0.1s; }
        .efemeride:nth-child(3) { animation-delay: 0.2s; }

        @keyframes franxa-brilo {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: var(--transicion);
        }

        button, input, textarea {
            font-family: inherit;
            background: none;
            border: none;
            color: inherit;
        }

        h1, h2, h3, .font-editorial {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 600;
            line-height: 1.15;
            letter-spacing: -0.02em;
            color: var(--cor-texto);
        }

        .contenedor {
            width: 100%;
            max-width: 1340px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* ========================================================
           TICKER DE NOVIDADES (barra desprazable superior)
           ======================================================== */
        #ticker-novidades {
            background-color: var(--primaria);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            padding: 8px 0;
            overflow: hidden;
            position: relative;
            z-index: 1001;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.4s ease;
        }

        #ticker-novidades.oculto {
            display: none;
        }

        .ticker-wrapper {
            display: flex;
            white-space: nowrap;
            padding-left: 100%;
            animation: marchar-ticker 25s linear infinite;
        }

        .ticker-item {
            display: inline-block;
            padding-right: 50px;
        }

        .ticker-item::after {
            content: "•";
            margin-left: 50px;
            color: var(--secundaria);
        }

        .ticker-wrapper:hover {
            animation-play-state: paused;
        }

        @keyframes marchar-ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* ========================================================
           HEADER STICKY CON EFECTO VIDRO
           ======================================================== */
        header {
            position: sticky;
            top: 16px;
            z-index: 1000;
            margin-top: 6px;
            transition: var(--transicion);
        }

        .header-glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: var(--bordo-fino);
            border-radius: var(--radius-medio);
            padding: 10px 24px;
            box-shadow: var(--sombra-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        [data-theme="dark"] .header-glass {
            background: rgba(26, 23, 24, 0.92);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 15px;
        }
        .logo-area img {
            height: 44px;
            width: auto;
            display: block;
        }
        .logo-sub {
            font-size: 17px;
            font-weight: 500;
            color: var(--cor-texto-mutado);
        }
        @media (max-width: 768px) {
            .logo-sub { display: none; }
        }
        [data-theme="dark"] .logo-area img {
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.35));
        }

        nav .menu-enlaces {
            display: flex;
            gap: 12px;
            list-style: none;
        }

        nav .menu-enlaces a {
            font-size: 13px;
            font-weight: 500;
            color: var(--cor-texto-mutado);
            padding: 6px 12px;
            border-radius: var(--radius-baixo);
            transition: var(--transicion);
        }

        nav .menu-enlaces a:hover,
        nav .menu-enlaces a.activo {
            color: var(--cor-texto);
            background-color: var(--bg-superficie-hover);
        }

        .header-accions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--cor-texto-mutado);
            transition: var(--transicion);
        }

        .btn-icon:hover {
            color: var(--cor-texto);
            background: var(--bg-superficie-hover);
        }

        .menu-mobil-btn {
            display: none;
        }

        /* ========================================================
           HERO — SECCIÓN PRINCIPAL (3 tipos: A/xeral, B/libro, C/contador)
           ======================================================== */
        .hero {
            padding: 20px 0 40px 0;
            position: relative;
        }

        .hero-wrapper {
            position: relative;
            border-radius: var(--radius-medio);
            overflow: hidden;
            min-height: 380px;
            display: flex;
            align-items: center;
            background-size: cover;
            background-position: center;
            box-shadow: var(--sombra-flotante);
        }

        .hero-wrapper .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(123, 28, 46, 0.55) 0%, rgba(123, 28, 46, 0.15) 50%, rgba(0, 0, 0, 0.1) 100%);
            z-index: 1;
        }

        .hero-wrapper .hero-grid {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 40px;
            align-items: center;
            padding: 50px 60px;
            width: 100%;
            color: #fff;
        }

        .hero-wrapper .hero-grid .hero-textos h1 {
            color: #fff;
            font-size: clamp(36px, 5vw, 52px);
            margin-bottom: 12px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
        }

        .hero-wrapper .hero-grid .hero-textos p {
            color: rgba(255, 255, 255, 0.92);
            font-size: 17px;
            margin-bottom: 24px;
            max-width: 90%;
        }

        .hero-wrapper .hero-grid .hero-tag {
            color: var(--secundaria);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 6px;
            display: block;
            text-shadow:
                0 0 12px rgba(0,0,0,0.8),
                0 0 6px rgba(0,0,0,0.6),
                0 2px 4px rgba(0,0,0,0.4);
            -webkit-text-stroke: 0.3px rgba(255,255,255,0.3);
        }

        .hero-wrapper .hero-grid .hero-cita {
            font-style: italic;
            font-size: 22px;
            border-left: 4px solid var(--secundaria);
            padding-left: 20px;
            margin: 16px 0;
            font-family: 'Playfair Display', serif;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 1px 12px rgba(0, 0, 0, 0.15);
        }

        .hero-wrapper .hero-grid .grupo-botones {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        .hero-wrapper .hero-grid .grupo-botones .btn-principal {
            background: #fff;
            color: var(--primaria);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .hero-wrapper .hero-grid .grupo-botones .btn-principal:hover {
            background: var(--secundaria);
            color: #fff;
            border-color: var(--secundaria);
        }
        .hero-wrapper .hero-grid .grupo-botones .btn-secundario {
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }
        .hero-wrapper .hero-grid .grupo-botones .btn-secundario:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .hero-wrapper .hero-imaxe-wrapper {
            border-radius: var(--radius-medio);
            overflow: hidden;
            height: 260px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .hero-wrapper .hero-imaxe-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-wrapper.no-image .hero-grid {
            grid-template-columns: 1fr;
            text-align: center;
            padding: 60px 40px;
        }

        .hero-wrapper.no-image .hero-grid .hero-textos p {
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-wrapper.no-image .hero-grid .grupo-botones {
            justify-content: center;
        }

        .hero-wrapper.hero-tipo-c {
            min-height: 480px;
        }
        .hero-wrapper.hero-tipo-c .hero-grid {
            grid-template-columns: 1fr;
            text-align: center;
            padding: 80px 60px;
        }
        .hero-wrapper.hero-tipo-c .hero-grid .hero-textos p {
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .hero-wrapper.hero-tipo-c .hero-grid .hero-textos h1 {
            font-size: clamp(40px, 5.5vw, 58px);
        }
        .hero-wrapper.hero-tipo-c .hero-grid .grupo-botones {
            justify-content: center;
        }
        .hero-accento {
            width: 60px;
            height: 4px;
            background: var(--secundaria);
            border-radius: 4px;
            margin: 0 auto 16px auto;
        }

        /* strip de evento destacado debaixo do hero — ESPECTACULAR */
        @keyframes heroFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes heroPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.15); }
            50%      { box-shadow: 0 0 0 20px rgba(255,255,255,0); }
        }

        .hero-evento-strip {
            position: relative;
            background-size: cover;
            background-position: center;
            min-height: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-top: 12px;
            border-radius: var(--radius-medio);
            box-shadow: var(--sombra-flotante);
            width: 100%;
        }

        .hero-evento-strip .hero-evento-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(80, 10, 30, 0.75) 0%, rgba(0, 0, 0, 0.4) 60%, rgba(0, 0, 0, 0.2) 100%);
            z-index: 1;
        }

        .hero-evento-strip .hero-evento-overlay::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--secundaria), #ffd166, var(--secundaria));
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .hero-evento-interior {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 32px;
            text-align: center;
            color: #fff;
            animation: heroFadeIn 0.8s ease-out forwards;
        }

        .hero-evento-interior .hero-tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #fff;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: var(--radius-pill);
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.25);
            text-shadow: 0 1px 8px rgba(0,0,0,0.5);
        }

        .hero-evento-interior h3 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 4vw, 48px);
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.6), 0 0 10px rgba(0,0,0,0.3);
            line-height: 1.1;
        }

        .hero-evento-interior .hero-evento-autor {
            font-size: 18px;
            color: #fff;
            opacity: 0.95;
            font-weight: 500;
            margin-bottom: 4px;
            text-shadow: 0 1px 12px rgba(0,0,0,0.5);
        }

        .hero-evento-interior .hero-evento-data {
            font-size: 15px;
            color: #fff;
            opacity: 0.9;
            margin-top: 4px;
            letter-spacing: 0.03em;
            text-shadow: 0 1px 10px rgba(0,0,0,0.4);
        }

        .hero-evento-interior .hero-evento-categoria {
            display: inline-block;
            font-size: 12px;
            color: #fff;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            padding: 3px 14px;
            border-radius: var(--radius-pill);
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            text-shadow: 0 1px 6px rgba(0,0,0,0.4);
        }

        .hero-evento-interior .accions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .hero-evento-interior .btn-principal {
            background: #fff;
            color: var(--primaria);
            padding: 12px 32px;
            border-radius: var(--radius-pill);
            font-weight: 600;
            font-size: 15px;
            transition: var(--transicion);
            border: none;
            animation: heroPulse 2.5s ease-in-out infinite;
        }

        .hero-evento-interior .btn-principal:hover {
            background: var(--secundaria);
            color: #fff;
            transform: scale(1.05);
            animation: none;
        }

        .hero-evento-interior .btn-secundario {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 12px 28px;
            border-radius: var(--radius-pill);
            font-weight: 500;
            font-size: 14px;
            transition: var(--transicion);
            backdrop-filter: blur(4px);
        }

        .hero-evento-interior .btn-secundario:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
        }
           
        .btn-principal {
            background-color: var(--primaria);
            color: #ffffff;
            padding: 12px 28px;
            border-radius: var(--radius-baixo);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: var(--transicion);
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-principal:hover {
            background-color: var(--primaria-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(123, 28, 46, 0.25);
        }

        .btn-secundario {
            background-color: transparent;
            color: var(--cor-texto);
            padding: 12px 28px;
            border-radius: var(--radius-baixo);
            font-size: 14px;
            font-weight: 500;
            border: var(--bordo-fino);
            transition: var(--transicion);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-secundario:hover {
            background-color: var(--bg-superficie-hover);
            border-color: var(--cor-texto-mutado);
            transform: translateY(-2px);
        }

        .badge-etiqueta {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            margin-top: 2px;
            align-self: flex-start;
            letter-spacing: 0.04em;
            background: var(--primaria);
            color: #fff;
        }

        .badge-etiqueta.etiqueta-novidade { background: #1565c0; color: #fff; }
        .badge-etiqueta.etiqueta-clásico { background: #6d4c41; color: #fff; }
        .badge-etiqueta.etiqueta-recomendado { background: #c29b62; color: #fff; }
        .badge-etiqueta.etiqueta-favorito { background: #c62828; color: #fff; }

        /* ========================================================
           SECCIÓNS XERAIS E EVENTOS DESTACADOS
           ======================================================== */
        .seccion {
            padding: 50px 0;
            border-bottom: var(--bordo-fino);
        }

        .seccion:last-of-type {
            border-bottom: none;
        }

        .efemeride {
            padding: 0 !important;
            border-bottom: none !important;
        }
        .efemeride-imaxe img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .efemeride-badge-letras {
            width: 120px;
            height: 120px;
            border-radius: 6px;
            background: linear-gradient(160deg, #F6AD55, #D69A2E, #F6E05E);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 12px 40px rgba(214,154,46,0.25);
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
            transform: perspective(800px) rotateY(-8deg);
            z-index: 2;
            transition: transform 0.5s ease;
            gap: 1px;
            margin-left: 10px;
        }
        .efemeride-badge-letras:hover {
            transform: perspective(800px) rotateY(0deg);
        }
        .efemeride-badge-letras::before {
            content: '';
            position: absolute;
            top: -3px; left: -3px; right: -3px;
            height: 5px;
            background: linear-gradient(90deg, #D69A2E, #F6E05E, #D69A2E);
            background-size: 200% 100%;
            animation: biblio-luz 3s ease-in-out infinite;
            border-radius: 4px 4px 0 0;
        }
        .efemeride-badge-letras::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: rgba(44,24,16,0.15);
            border-radius: 2px;
        }
        .efemeride-badge-letras i {
            font-size: 36px;
            color: #2C1810;
        }
        .efemeride-badge-letras span {
            font-size: 7px;
            font-weight: 800;
            text-transform: uppercase;
            color: #2C1810;

        .etiqueta {

            font-weight: 600;
            text-transform: uppercase;

        }

        .cartel-autor {
            font-size: 12px;
            color: var(--cor-texto-mutado);

        .cartel-titulo {

        }

        .actividades-menores-grid {

            gap: 20px;

        .card-menor {
            background: var(--bg-superficie);
            border-radius: var(--radius-medio);
            border: var(--bordo-fino);
            box-shadow: var(--sombra-card);

        .card-menor:hover {
            transform: translateY(-3px);

            border-color: var(--bordo-hover);
        }

        .card-menor-overlay {

        .card-menor-contido {
            position: relative;

        .card-menor[style*="background-image"] .card-menor-data,

            color: rgba(255,255,255,0.85);

        .card-menor-data {

            color: var(--cor-texto-mutado);
            margin-bottom: 4px;

        .card-menor-titulo {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-menor-desc {
            font-size: 13px;
            color: var(--cor-texto-mutado);
        }

        .cartel-contador {

        .cartel-contador-hoxe {

        /* ========================================================
           CARRUSEL DE LIBROS (scroll horizontal con tarxetas)
           ======================================================== */
        .carrusel-cinta {
            margin-bottom: 44px;
        }

        .carrusel-cinta:last-child {
            margin-bottom: 0;
        }

        .carrusel-cinta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .carrusel-cinta-header h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 22px;
            letter-spacing: -0.02em;
            color: var(--cor-texto);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .carrusel-cinta-header h3 .badge-cinta {
            font-size: 12px;
            background: var(--secundaria);
            color: #fff;
            padding: 2px 12px;
            border-radius: var(--radius-pill);
            font-weight: 400;
            font-family: 'Inter', sans-serif;
        }

        .carrusel-cinta-header .carrusel-flechas {
            display: flex;
            gap: 6px;
        }

        .carrusel-cinta-header .carrusel-flechas button {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--bg-superficie);
            border: var(--bordo-fino);
            color: var(--cor-texto-mutado);
            cursor: pointer;
            transition: var(--transicion);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carrusel-cinta-header .carrusel-flechas button:hover {
            background: var(--bg-superficie-hover);
            color: var(--cor-texto);
        }

        .carrusel-track {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 8px 0 16px 0;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            cursor: grab;
            user-select: none;
        }

        .carrusel-track:active {
            cursor: grabbing;
        }

        .carrusel-track::-webkit-scrollbar {
            display: none;
        }

        /* dobre fila: grid con páxinas */
        .carrusel-track-grid {
            position: relative;
            overflow: hidden;
        }
        .carrusel-track[id^="carrusel-preferidos-"] .card-preferido {
            width: 170px;
            scroll-snap-align: start;
        }
        .carrusel-cinta-dobre .carrusel-cinta-header {
            margin-bottom: 12px;
        }

        .card-libro-netflix {

            border: var(--bordo-fino);

            overflow: hidden;
            transition: var(--transicion);
            cursor: pointer;
            display: flex;
            flex-direction: column;

        .card-libro-netflix:hover {

            border-color: var(--bordo-hover);
        }

        .card-libro-netflix .img-wrap {
            width: 100%;

            overflow: hidden;
            background: var(--bg-principal);
            position: relative;

        .card-libro-netflix .img-wrap img {

            height: 100%;
            object-fit: cover;

        .card-libro-netflix:hover .img-wrap img {
            transform: scale(1.04);

        .card-libro-netflix .info {
            padding: 12px 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .card-libro-netflix .info h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--cor-texto);

        }

        .card-libro-netflix .info .autor {
            font-size: 12px;
            color: var(--cor-texto-mutado);
        }

        .card-libro-netflix .info .favorito-de {
            font-size: 11px;
            color: var(--coral);
            font-weight: 500;
            margin-top: 2px;
        }

        .card-libro-netflix .info .badge-etiqueta {
            margin-top: 4px;
        }

        .card-libro-profesor {
            flex: 0 0 340px;
            background: var(--bg-superficie);
            border-radius: var(--radius-medio);
            border: var(--bordo-fino);
            box-shadow: var(--sombra-card);
            overflow: hidden;
            transition: var(--transicion);
            cursor: pointer;
            display: flex;
            gap: 0;
        }

        .card-libro-profesor:hover {
            transform: translateY(-4px);
            box-shadow: var(--sombra-card-hover);
            border-color: var(--bordo-hover);
        }

        .card-libro-profesor .img-wrap {
            flex: 0 0 120px;
            height: 160px;
            overflow: hidden;
            position: relative;
        }

        .card-libro-profesor .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transicion);
        }

        .card-libro-profesor:hover .img-wrap img {
            transform: scale(1.04);
        }

        .card-libro-profesor .info {
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }

        .card-libro-profesor .info h4 {
            font-size: 16px;
            font-weight: 600;
            color: var(--cor-texto);
            line-height: 1.2;
        }

        .card-libro-profesor .info .autor {
            font-size: 13px;
            color: var(--cor-texto-mutado);
        }

        .card-libro-profesor .info .favorito-de {
            font-size: 12px;
            color: var(--coral);
            font-weight: 500;
            margin-top: 4px;
        }

        /* badge de etiqueta sobre a portada */
        .badge-portada {
            position: absolute;
            top: 6px;
            right: 6px;
            color: #fff;
            font-size: 9px;
            font-weight: 600;
            padding: 1px 7px;
            border-radius: var(--radius-pill);
            border: 1.5px solid #fff;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            pointer-events: none;
        }
        .badge-portada.novidade { background: #e07a5f; }
        .badge-portada.clásico { background: #b8860b; }
        .badge-portada.recomendado { background: #4a90d9; }
        .badge-portada.default { background: var(--primaria); }

        /* card de favorito horizontal para carrusel */
        .card-preferido {
            display: flex;
            flex-direction: column;
            background: var(--bg-superficie);
            border-radius: var(--radius-medio);
            border: var(--bordo-fino);
            box-shadow: var(--sombra-card);
            overflow: hidden;
            transition: var(--transicion);
            cursor: pointer;
            gap: 0;
            position: relative;
        }

        .card-preferido:hover {
            transform: translateY(-4px);
            box-shadow: var(--sombra-card-hover);
            border-color: var(--bordo-hover);
        }

        .card-preferido .img-wrap {
            width: 100%;
            height: 120px;
            overflow: hidden;
            flex: none;
        }

        .card-preferido .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transicion);
        }

        .card-preferido:hover .img-wrap img {
            transform: scale(1.04);
        }

        .card-preferido .info {
            flex: 1;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .card-preferido .info h4 {
            font-size: 12px;
            font-weight: 600;
            color: var(--cor-texto);
            line-height: 1.2;
            margin-bottom: 1px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-preferido .info .autor {
            font-size: 10px;
            color: var(--cor-texto-mutado);
        }

        .card-preferido .info .favorito-de {
            font-size: 10px;
            color: var(--cor-texto-mutado);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .card-preferido .info .favorito-de .nome-persoa {
            font-weight: 600;
            color: var(--cor-texto);
        }

        .card-preferido .info .favorito-de .grupo-badge {
            display: inline-block;
            font-size: 7px;
            font-weight: 500;
            letter-spacing: 0.02em;
            padding: 1px 4px;
            border-radius: 2px;
            color: #fff;
            opacity: 0.5;
            text-transform: uppercase;
            line-height: 1.3;
        }
        .grupo-badge.badge-profe { background: #7f8c8d; }
        .grupo-badge.badge-alumno { background: #7f8c8d; }
        .grupo-badge.badge-familia { background: #7f8c8d; }
        .grupo-badge.badge-convidado { background: #7f8c8d; }
        .grupo-badge.badge-outros { background: #95a5a6; }

        /* etiqueta sobre a info, non sobre a portada */
        .card-preferido .badge-portada {
            top: 4px;
            right: 4px;
        }

        /* ========================================================
           BOTÓNS DE FILTRO (BiblioBenestar, Memoria, Planetario)
           ======================================================== */
        .filtro-botons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }

        .filtro-botons button {
            padding: 10px 24px;
            border-radius: var(--radius-pill);
            border: var(--bordo-fino);
            background: var(--bg-superficie);
            color: var(--cor-texto-mutado);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transicion);
        }

        .filtro-botons button:hover {
            background: var(--bg-superficie-hover);
            border-color: var(--primaria);
            color: var(--cor-texto);
        }

        .filtro-botons button.activo {
            background: var(--primaria);
            color: #fff;
            border-color: var(--primaria);
        }

        /* tira de botóns grandes en fila horizontal */
        .tira-botons {
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tira-botons button {
            flex: 1;
            min-width: 160px;
            max-width: 280px;
            text-align: center;
            padding: 14px 16px;
            border-radius: var(--radius-medio);
            display: flex;
            flex-direction: column;
            gap: 2px;
            align-items: center;
        }
        .tira-botons button:hover {
            border-color: var(--primaria);
        }
        .tira-botons button.activo {
            background: var(--primaria);
            color: #fff;
            border-color: var(--primaria);
        }

        /* botóns con icona */
        .tira-iconas {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }
        .tira-iconas button {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 14px;
            flex: 1 1 220px;
            min-width: 200px;
            max-width: 400px;
            text-align: left;
            padding: 16px 20px;
            border-radius: var(--radius-medio);
            border: var(--bordo-fino);
            background: var(--bg-superficie);
            cursor: pointer;
            transition: var(--transicion);
            color: var(--cor-texto);
        }
        .tira-iconas button:hover {
            border-color: var(--primaria);
            background: var(--bg-superficie-hover);
            transform: translateY(-2px);
            box-shadow: var(--sombra-card-hover);
        }
        .tira-iconas button.activo {
            background: linear-gradient(135deg, var(--primaria), #5e1322);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(123, 28, 46, 0.25);
        }
        .tira-iconas button .icona-filtro {
            flex: 0 0 40px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-medio);
            background: rgba(123, 28, 46, 0.08);
            color: var(--primaria);
        }
        .tira-iconas button.activo .icona-filtro {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        .tira-iconas button .tira-textos {
            display: flex;
            flex-direction: column;
        }
        .tira-iconas .tira-titulo {
            font-size: 15px;
            font-weight: 600;
        }
        .tira-iconas .tira-sub {
            font-size: 12px;
            color: var(--cor-texto-mutado);
            font-weight: 400;
        }
        .tira-iconas button.activo .tira-sub {
            color: rgba(255,255,255,0.8);
        }
        .tira-titulo {
            font-size: 14px;
            font-weight: 600;
        }
        .tira-sub {
            font-size: 11px;
            color: var(--cor-texto-mutado);
            font-weight: 400;
        }
        .tira-botons button.activo .tira-sub {
            color: rgba(255,255,255,0.8);
        }

        .carrusel-filtrado {
            display: none;
        }

        .carrusel-filtrado.visible {
            display: block;
        }

        /* filtro despregable para preferidos */
        .filtro-preferidos {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .filtro-preferidos label {
            font-size: 13px;
            font-weight: 600;
            color: var(--cor-texto-mutado);
        }

        .filtro-preferidos select {
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            border: var(--bordo-fino);
            background: var(--bg-superficie);
            font-family: inherit;
            font-size: 14px;
            color: var(--cor-texto);
            cursor: pointer;
        }

        .card-libro-profesor .info .badge-etiqueta {
            margin-top: 4px;
        }

        /* libro do mes — hero con gradiente */
        .libro-mes-hero {
            position: relative;
            min-height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0f0a1a 0%, #1a0f0f 30%, #2d1b1b 60%, #1a1218 100%);
            border-radius: var(--radius-medio);
            overflow: hidden;
            box-shadow: var(--sombra-flotante);
        }
        .libro-mes-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .libro-mes-hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(123, 28, 46, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .libro-mes-hero .libro-mes-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.1) 100%);
            z-index: 1;

            z-index: 2;
            display: grid;
            grid-template-columns: 0.45fr 1.55fr;
            gap: 50px;
            padding: 60px 70px;
            align-items: center;
            width: 100%;

            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .libro-mes-imaxe::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(212, 175, 55, 0.12);
            border-radius: var(--radius-medio);
            transform: rotate(3deg);
            pointer-events: none;
        }
        .libro-mes-imaxe img {
            max-width: 260px;
            height: 380px;
            object-fit: cover;
            border-radius: var(--radius-medio);
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
            transform: rotate(-2.5deg);
            transition: all 0.4s ease;

        .libro-mes-imaxe img:hover {
            transform: rotate(0deg) scale(1.03);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);

        .libro-mes-texto {
            color: #fff;
        }
        .libro-mes-texto .seccion-meta {
            color: var(--secundaria);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            display: block;
            margin-bottom: 4px;
        }
        .libro-mes-texto h3 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            color: #fff;
            margin: 6px 0 4px;
            line-height: 1.1;
            letter-spacing: -0.01em;
        }
        .libro-mes-texto .autor-premium {
            font-weight: 600;

    <!--
    ================================================================
    CONFIGURACIÓN DA CARGA DE DATOS
    ================================================================
    Descomenta o que corresponda segundo o teu despregue:

      A) Google Sheets API directa (máis rápida):
         - Necesitas unha API Key de Google Cloud con acceso a Sheets API
         - Asigna a túa chave a window._SHEETS_KEY

      B) Worker / Proxy (Cloudflare Worker ou Apps Script):
         - O worker recibe ?sheet=nome e devolve CSV
         - Asigna a URL a window._API_URL

      C) CSVs locais (sen backend):
         - Non definas ningunha variable, o código le os CSVs de /datos/

    Orde de carga: Sheets API → Worker → CSVs locais → Exemplos fixos
    ================================================================ -->
    <script>
        window._SHEETS_KEY = 'AIzaSyC3L9_DJtqn4MOFnbMD8UPDyzS0nS35mFE';
        window._API_URL = 'https://biblio.pinguelabiblio.workers.dev/';
    </script>

    <!-- ============================================================
         JAVASCRIPT — LÓXICA COMPLETA DA APLICACIÓN
         ============================================================ -->
    <script>
        /* -------------------------------------------------------
           MENÚ MÓBIL — toggle do menú en pantallas pequenas
           ------------------------------------------------------- */
        document.getElementById('menu-mobil-toggle').addEventListener('click', function () {
            document.getElementById('menu-enlaces').classList.toggle('visible');

            });

        /* -------------------------------------------------------
           TOAST — notificación non intrusiva
           ------------------------------------------------------- */
        function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

        function mostrarToast(msg, cor) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = cor || '#1a1617';
            t.classList.add('visible');
            setTimeout(function () { t.classList.remove('visible'); }, 3000);
        }

        /* -------------------------------------------------------
           TOGGLE DE TEMA (claro / escuro)
           Garda o estado en data-theme no <body> e cambia o icono
           ------------------------------------------------------- */
        document.getElementById('theme-toggle').addEventListener('click', function () {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const novo = current === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', novo);
            this.innerHTML = novo === 'dark'
                ? '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>'
                : '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16.5 12a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/></svg>';
        });

        /* -------------------------------------------------------
           PARSEADOR DE CSV
           parseCSV(texto) → { cabeceras: [], datos: [] }
           parseLinhaCSV(linha) → ["campo1","campo2"...]
           Soporta campos entre comiñas dobres.
           ------------------------------------------------------- */
        function parseCSV(texto) {
            var linhas = [], atual = '', dentroAspas = false;
            for (var i = 0; i < texto.length; i++) {
                var c = texto[i];
                if (c === '"') { dentroAspas = !dentroAspas; atual += c; }
                else if (c === '\n' && !dentroAspas) {
                    if (atual.trim() !== '') linhas.push(atual);
                    atual = '';
                } else { atual += c; }
            }
            if (atual.trim() !== '') linhas.push(atual);
            if (linhas.length < 2) return { cabeceras: [], datos: [] };
            const cabeceras = parseLinhaCSV(linhas[0]);
            const datos = [];
            for (let i = 1; i < linhas.length; i++) {
                const valores = parseLinhaCSV(linhas[i]);
                const obj = {};
                cabeceras.forEach((key, idx) => { obj[key] = valores[idx] || ''; });
                datos.push(obj);
            }
            return { cabeceras, datos };
        }

        function parseLinhaCSV(linha) {
            const res = [];
            let atual = '', dentro = false;
            for (let i = 0; i < linha.length; i++) {
                const c = linha[i];
                if (c === '"') {
                    if (dentro && i + 1 < linha.length && linha[i + 1] === '"') {
                        atual += '"';
                        i++;
                    } else {
                        dentro = !dentro;
                    }
                } else if (c === ',' && !dentro) { res.push(atual.trim()); atual = ''; }
                else atual += c;
            }
            res.push(atual.trim());
            return res;
        }

        /* -------------------------------------------------------
           ESTADO GLOBAL DA APLICACIÓN
           configuracion → obxecto dende configuracion.csv
           libros        → array dende contido.csv (filas con título)
           eventos       → array dende contido.csv (filas con evento_titulo)
           seccions      → array dende seccions.csv (só activas, ordenadas)
           ------------------------------------------------------- */
        let configuracion = {};
        let libros = [];
        let eventos = [];
        let seccions = [];
        const _API_URL = window._API_URL || null;
        const _SHEETS_KEY = window._SHEETS_KEY || null;
        const SHEET_ID = '159cNjgHw2BNr20nhxEqophX3RRtWjdmokDWoWz5mBw0';

        /* -------------------------------------------------------
           apiURL(sheet) → URL do CSV segundo o modo de despregue
           - Se _SHEETS_KEY está definido: Google Sheets API v4
           - Se _API_URL está definido: worker proxy
           - Senón: CSVs locais en /datos/
           ------------------------------------------------------- */
        function apiURL(sheet) {
            if (_SHEETS_KEY) return 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + encodeURIComponent(sheet) + '?key=' + _SHEETS_KEY;
            if (_API_URL) return _API_URL + '?sheet=' + sheet;
            return '/datos/' + sheet + '.csv';
        }

        /* -------------------------------------------------------
           fetchSheet(sheet) — obtén CSV desde Google Sheets API
           A Sheets API devolve JSON, esta función converte a CSV
           para que procesarCSVs() o trate igual que os outros.
           ------------------------------------------------------- */
        async function fetchSheet(sheet) {
            if (_SHEETS_KEY) {
                const r = await fetch(apiURL(sheet));
                const data = await r.json();
                if (!data.values) throw new Error('Baleiro: ' + sheet);
                const csv = data.values.map(function (row) {
                    return row.map(function (c) {
                        if (c == null) return '';
                        var s = String(c);
                        if (/[,"\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
                        return s;
                    }).join(',');
                }).join('\n');
                return new Response(csv, { status: 200, statusText: 'OK', headers: { 'Content-Type': 'text/csv' } });
            }
            return fetch(apiURL(sheet));
        }

        /* -------------------------------------------------------
            mostrarErro(msg) — amosa un aviso vermello se fallan os CSVs
            ------------------------------------------------------- */
        function mostrarErro(msg) {
            let div = document.getElementById('erro-csv');
            if (!div) {
                div = document.createElement('div');
                div.id = 'erro-csv';
                div.style.cssText = 'background:#fee;border:1px solid #c00;color:#c00;padding:10px 20px;border-radius:8px;margin:12px 30px;display:block;';
                document.querySelector('.contenedor').prepend(div);
            }
            div.textContent = 'Erro: ' + msg;
        }

        /* -------------------------------------------------------
           cargarDatos() — fai fetch dos CSVs con caché localStorage
           Primeiro mostra datos cacheados (se hai), despois actualiza
           en segundo plano. Apps Script tarda 3-5s en cold start.
           ------------------------------------------------------- */
        function cargarCache() {
            try {
                const cache = JSON.parse(localStorage.getItem('biblio_cache') || '{}');
                if (cache.ts && Date.now() - cache.ts < 3600000) { // 1 hora
                    if (cache.cfg) configuracion = cache.cfg;
                    if (cache.libros) libros = cache.libros;
                    if (cache.eventos) eventos = cache.eventos;
                    if (cache.seccions) seccions = cache.seccions;
                    if (libros.length || eventos.length || seccions.length) return true;
                }
            } catch (e) {}
            return false;
        }
        function gardarCache() {
            try {
                localStorage.setItem('biblio_cache', JSON.stringify({
                    ts: Date.now(),
                    cfg: configuracion,
                    libros: libros,
                    eventos: eventos,
                    seccions: seccions
                }));
            } catch (e) {}
        }

        /* -------------------------------------------------------
           procesarCSVs(responses) — transforma 4 CSVs en datos globais
           Recibe un array de 4 Response (config, contido, seccions, galeria)
           e enche as variables: configuracion, libros, eventos, seccions
           ------------------------------------------------------- */
        async function procesarCSVs(responses) {
            const [rCfg, rCont, rSec, rGal] = responses;
            const cfg = (parseCSV(await rCfg.text())).datos[0] || {};
            configuracion = {
                ticker_activo: cfg.ticker_activo || 'SI',
                ticker: cfg.ticker || 'Benvidos á biblioteca',
                hero_tipo: cfg.hero_tipo || 'A',
                hero_titulo: cfg.hero_titulo || 'Un lugar onde as historias cobran vida',
                hero_subtitulo: cfg.hero_subtitulo || 'Benvido ao espazo cultural...',
                hero_imaxe: cfg.hero_imaxe || 'https://images.unsplash.com/photo-1521587760476-6c12a4b040da?auto=format&fit=crop&w=1000&q=80',
                hero_boton_texto: cfg.hero_boton_texto || 'Explorar Eventos',
                hero_boton_link: cfg.hero_boton_link || '#seccion-eventos',
                hero_boton2_texto: cfg.hero_boton2_texto || 'Recomendacións',
                hero_boton2_link: cfg.hero_boton2_link || '#seccion-carrusel',
                hero_libro_titulo: cfg.hero_libro_titulo || 'As Malas Mulleres',
                hero_libro_autor: cfg.hero_libro_autor || 'Marilar Aleixandre',
                hero_libro_cita: cfg.hero_libro_cita || 'A literatura ten forza.',
                hero_libro_portada: cfg.hero_libro_portada || 'https://images.unsplash.com/photo-1495640388908-05fa85288e61?auto=format&fit=crop&w=500&q=80',
                recursos: (function () { try { return JSON.parse(cfg.recursos || '[]'); } catch (e) { return []; } })()
            };

            const contData = (parseCSV(await rCont.text())).datos;
            for (const row of contData) {
                if (row.evento_titulo && row.evento_titulo.trim() !== '') {
                    eventos.push({
                        titulo: row.evento_titulo,
                        autor: row.evento_autora || '',
                        data: row.evento_data || '',
                        hora: row.evento_hora || '',
                        categoria: row.evento_categoria || 'Outro',
                        imaxe: row.evento_imaxe || '',
                        destacado: row.evento_destacado || 'NON',
                        hero_destacado: row.hero_destacado || 'NON',
                        descricion: row.descricion || ''
                    });
                } else if (row.titulo && row.titulo.trim() !== '') {
                    libros.push({
                        titulo: row.titulo,
                        autor: row.autor || '',
                        imaxe: row.imaxe || '',
                        descricion: row.descricion || '',
                        categoria: row.categoria || 'Xeral',
                        nivel: row.nivel || '',
                        link: row.link || '#',
                        favorito_de: row.favorito_de || '',
                        destacado: row.destacado || 'NON',
                        etiqueta: row.etiqueta || '',
                        disponible: row.disponible || 'SI',
                        cita: row.cita || ''
                    });
                }
            }

            const secData = (parseCSV(await rSec.text())).datos;
            seccions = secData
                .filter(s => s.activo && s.activo.trim().toUpperCase() === 'SI')
                .sort((a, b) => parseInt(a.orde) - parseInt(b.orde));

            if (rGal && rGal.ok) {
                const galDatos = (parseCSV(await rGal.text())).datos;
                window._galeriaDatos = galDatos.map(function (g) {
                    return { directorio: g.directorio || '', desc: g.descricion || '', url: g.url || '' };
                }).filter(function (g) { return g.url; });
            }
        }

        /* -------------------------------------------------------
           cargarDatos() — carga os datos con fallback multi-nivel
           Orde de intentos:
             1. Google Sheets API directa (se _SHEETS_KEY está definido)
             2. Worker proxy (se _API_URL está definido)
             3. CSVs locais en /datos/
             4. Exemplos fixos (último recurso)
           ------------------------------------------------------- */
        async function cargarDatos() {
            // Se hai cache válida, úsaa mentres cargamos datos frescos en segundo plano
            if (cargarCache()) renderizarTodo();

            /* completar() — chámase tras obter datos correctamente.
               Se algunha lista está baleira, pon exemplos por defecto. */
            function completar() {
                if (!libros.length) { libros = [{ titulo: 'Exemplo', autor: 'Autor', imaxe: 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?auto=format&fit=crop&w=400&q=80', descricion: 'Descrición', categoria: 'Novela', nivel: '14+', link: '#', favorito_de: '', etiqueta: 'Novidade', disponible: 'SI', cita: '' }]; }
                if (!eventos.length) { eventos = [{ titulo: 'Evento exemplo', autor: 'Autora', data: '12 Maio 2026', hora: '11:30h', categoria: 'Obradoiro', imaxe: 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?auto=format&fit=crop&w=800&q=80', destacado: 'SI', hero_destacado: 'NON', descricion: 'Descrición do evento' }]; }
                if (!seccions.length) { seccions = [{ tipo_seccion: 'carrusel', titulo: 'Recomendacións', filtro_categoria: '', orde: '1', activo: 'SI' }]; }
                gardarCache(); renderizarTodo();
            }

            // 1. Google Sheets API directa (máis rápida, ~200ms)
            if (_SHEETS_KEY) {
                try {
                    const r = await Promise.all([
                        fetchSheet('configuracion'),
                        fetchSheet('contido'),
                        fetchSheet('seccions'),
                        fetchSheet('galeria')
                    ]);
                    if (r.every(x => x.ok)) {
                        libros = []; eventos = [];
                        await procesarCSVs(r);
                        completar();
                        return;
                    }
                } catch (e) { /* fallback ao worker */ }
            }

            // 2. Fallback: worker proxy (se Sheets API falla ou non está configurada)
            if (_API_URL) {
                try {
                    const base = _API_URL.replace(/\/+$/, '');
                    const r = await Promise.all([
                        fetch(base + '?sheet=configuracion'),
                        fetch(base + '?sheet=contido'),
                        fetch(base + '?sheet=seccions'),
                        fetch(base + '?sheet=galeria')
                    ]);
                    if (r.every(x => x.ok)) {
                        libros = []; eventos = [];
                        await procesarCSVs(r);
                        completar();
                        return;
                    }
                } catch (e) { /* fallback a CSVs locais */ }
            }

            // 4. Fallback final: CSVs locais
            try {
                const r = await Promise.all([
                    fetch('datos/configuracion.csv'),
                    fetch('datos/contido.csv'),
                    fetch('datos/seccions.csv'),
                    fetch('datos/galeria.csv')
                ]);
                if (r[0].ok) {
                    libros = []; eventos = [];
                    await procesarCSVs(r);
                    completar();
                    return;
                }
            } catch (e) { /* fallback a exemplos */ }

            // 5. Fallback final: exemplos fixos
            if (!libros.length) {
                configuracion = { ticker: 'Benvidos', ticker_activo: 'SI', hero_tipo: 'A', hero_titulo: 'Biblioteca IES A Pinguela', hero_subtitulo: 'Benvido ao espazo cultural', hero_imaxe: 'https://images.unsplash.com/photo-1521587760476-6c12a4b040da?auto=format&fit=crop&w=1000&q=80', hero_boton_texto: 'Explorar', hero_boton_link: '#seccion-eventos' };
                libros = [{ titulo: 'Libro de exemplo', autor: 'Autor', imaxe: 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?auto=format&fit=crop&w=400&q=80', descricion: 'Descrición de exemplo', categoria: 'Xeral', nivel: '14+', link: '#', favorito_de: '', etiqueta: '', disponible: 'SI', cita: '' }];
                eventos = [{ titulo: 'Evento de exemplo', autor: 'Autora', data: '12 Maio 2026', hora: '11:30h', categoria: 'Outro', imaxe: 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?auto=format&fit=crop&w=800&q=80', destacado: 'SI', hero_destacado: 'NON', descricion: '' }];
                seccions = [{ tipo_seccion: 'carrusel', titulo: 'Recomendacións', filtro_categoria: '', orde: '1', activo: 'SI' }];
                renderizarTodo();
            }
        }

        /* -------------------------------------------------------
           renderizarTodo() — punto de entrada tras cargar os datos
           Orde: ticker → hero → seccións dinámicas → modais → drag
           ------------------------------------------------------- */
        function renderizarTodo() {
            const ls = document.getElementById('loading-screen');
            if (ls) { ls.style.opacity = '0'; setTimeout(function(){ ls.style.display = 'none'; }, 400); }
            renderizarTicker();
            renderizarHero();
            renderizarSeccionsDinamicas();
            inicializarModal();
            inicializarDragSliders();
        }

        /* -------------------------------------------------------
           renderizarTicker() — mostra/oculta a barra animada
           Se ticker_activo = "NON", oculta o contedor.
           Os items sepáranse por "·" no CSV.
           ------------------------------------------------------- */
        function renderizarTicker() {
            const tickerContainer = document.getElementById('ticker-novidades');
            if (!tickerContainer) return;

            if (configuracion.ticker_activo && configuracion.ticker_activo.toUpperCase() === 'NON') {
                tickerContainer.classList.add('oculto');
                return;
            } else {
                tickerContainer.classList.remove('oculto');
            }

            const c = document.getElementById('ticker-contido');
            if (!c) return;
            const items = (configuracion.ticker || '').split('·').map(s => s.trim()).filter(s => s);
            c.innerHTML = items.length ? items.map(i => '<span class="ticker-item">' + i + '</span>').join('') : '<span class="ticker-item">Benvidos</span>';
        }

        /* -------------------------------------------------------
           parseDate(str) — converte "12 Maio 2026" → Date
           Usa abreviaturas en galego (Xan, Feb, Mar...)
           ------------------------------------------------------- */
        function parseDate(str) {
            if (!str) return new Date(0);
            try {
                str = str.trim();
                const m = str.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
                if (m) return new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));
                if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return new Date(str + 'T00:00:00');
                const p = str.split(' ');
                const d = parseInt(p[0]);
                const mesTxt = p[1];
                const a = parseInt(p[2] || new Date().getFullYear());
                const meses = { Xan: 0, Feb: 1, Mar: 2, Abr: 3, Mai: 4, Xuñ: 5, Xul: 6, Ago: 7, Set: 8, Out: 9, Nov: 10, Dec: 11 };
                return new Date(a, meses[mesTxt] || 0, d);
            } catch (e) { return new Date(0); }
        }

                        break;

                        html += xerarLibroMes(secc);
                        break;
                    case 'club':
                        html += xerarClub(secc);
                        break;
                    case 'normas':
                        html += xerarNormas(secc);
                        break;
                    case 'galeria':
                        html += xerarGaleria(secc);
                        break;
                    case 'contacto':
                        html += xerarContacto(secc);
                        break;
            case 'bibliobenestar':
            case 'memoria':
            case 'planetario':
            case 'subapartados':
                html += xerarSeccionFiltros(secc, secc.tipo_seccion);

        /* -------------------------------------------------------
           xerarEventos(secc) → HTML da sección de eventos
           Separa en destacados (max 3) e menores (max 4).
           Inclúe botóns para ver futuros/pasados.
           ------------------------------------------------------- */
        function diasAta(strData) {
            var d = parseDate(strData);
            return Math.ceil((d - new Date()) / (1000 * 60 * 60 * 24));
        }

        function xerarEventos(secc) {
            const titulo = secc.titulo || 'Axenda Cultural';
            const hoxe = new Date();
            const ordenados = [...eventos].sort(function (a, b) { return parseDate(a.data) - parseDate(b.data); });
            var maxDest = window.innerWidth <= 768 ? 2 : 3;

            var destacados = ordenados.filter(function (e) { return e.destacado && e.destacado.toUpperCase() === 'SI' && parseDate(e.data) >= hoxe; });
            if (!destacados.length) {
                destacados = ordenados.filter(function (e) { return parseDate(e.data) >= hoxe; }).slice(0, maxDest);
            } else {
                destacados = destacados.slice(0, maxDest);
            }

            var destacadosSet = {};
            destacados.forEach(function (e) { destacadosSet[e.titulo + '|' + e.data] = true; });
            const menores = ordenados.filter(function (e) { return !destacadosSet[e.titulo + '|' + e.data]; }).slice(0, 4);

            let html = '<section class="seccion" id="seccion-eventos">'
                + '<div class="seccion-titulo-liña"><div><span class="seccion-meta">O máis importante</span><h2>' + titulo + '</h2></div></div>';

            if (destacados.length) {
                html += '<div class="eventos-destacados-grid">';
                destacados.forEach(function (ev) {
                    var faltan = diasAta(ev.data);
                    var contadorHTML = faltan > 0
                        ? '<div class="cartel-contador">Faltan <strong>' + faltan + '</strong> día' + (faltan !== 1 ? 's' : '') + '</div>'
                        : faltan === 0
                            ? '<div class="cartel-contador cartel-contador-hoxe">Hoxe</div>'
                            : '';
                    html += '<div class="cartel-evento" data-evento=\'' + escaparJSON(ev) + '\'>'
                        + '<div class="cartel-imaxe-contedor"><img src="' + escAttr(ev.imaxe || 'https://images.unsplash.com/photo-1526244434298-88fc74916d95?auto=format&fit=crop&w=800&q=80') + '" alt="' + escAttr(ev.titulo) + '" class="cartel-imaxe">'
                        + '<div class="cartel-data-badge">' + esc(ev.data.split(' ')[0]) + '<span>' + esc(ev.data.split(' ')[1] || '') + '</span></div>'
                        + contadorHTML + '</div>'
                        + '<div class="cartel-contido"><div><span class="cartel-etiquetas"><span class="etiqueta">' + esc(ev.categoria) + '</span></span>'
                        + '<div class="cartel-autor">' + esc(ev.autor) + '</div>'
                        + '<h3 class="cartel-titulo">' + esc(ev.titulo) + '</h3></div>'
                        + '<span style="font-size:13px;color:var(--cor-texto-mutado);display:flex;align-items:center;gap:6px;"><i class="fas fa-clock"></i> ' + esc(ev.hora || '') + '</span>'
                        + '</div></div>';
                });
                html += '</div>';
            } else {
                html += '<p style="color:var(--cor-texto-mutado);">Non hai eventos proximos.</p>';
            }

            if (menores.length) {
                html += '<div class="actividades-menores-grid">';
                menores.forEach(function (ev) {
                    var imgFondo = ev.imaxe ? ' style="background-image:url(\'' + escAttr(ev.imaxe) + '\');background-size:cover;background-position:center;position:relative;"' : '';
                    html += '<div class="card-menor" data-evento=\'' + escaparJSON(ev) + '\'' + imgFondo + '>'
                        + (ev.imaxe ? '<div class="card-menor-overlay"></div>' : '')
                        + '<div class="card-menor-contido">'
                        + '<span class="card-menor-data">' + esc(ev.data) + '</span>'
                        + '<h4 class="card-menor-titulo">' + esc(ev.titulo) + '</h4>'
                        + '<p class="card-menor-desc">' + (ev.autor ? 'Por ' + esc(ev.autor) : '') + ' · ' + esc(ev.categoria) + '</p>'
                        + '</div></div>';
                });
                html += '</div>';
            }

            var idEventos = 'eventos-' + (secc.orde || '0');
            html += '<div style="margin-top:28px;display:flex;gap:12px;flex-wrap:wrap;">'
                + '<button class="btn-secundario btn-toggle-eventos" data-target="' + idEventos + '" data-tipo="futuros" style="padding:8px 20px;font-size:13px;">Ver próximos eventos</button>'
                + '<button class="btn-secundario btn-toggle-eventos" data-target="' + idEventos + '" data-tipo="pasados" style="padding:8px 20px;font-size:13px;">Eventos pasados</button>'
                + '</div>'
                + '<div id="' + idEventos + '" style="margin-top:20px;display:none;"></div>'
                + '</section>';

            return html;
        }

        /* -------------------------------------------------------
           toggleEventos(tipo) — mostra eventos futuros ou pasados
           tipo = "futuros" | "pasados"
           ------------------------------------------------------- */
        function toggleEventos(tipo, btn) {
            var id = btn ? btn.dataset.target : 'eventos-extra';
            const container = document.getElementById(id);
            if (!container) return;

            if (container.style.display !== 'none' && container.dataset.tipo === tipo) {
                container.style.display = 'none';
                container.innerHTML = '';
                return;
            }

            const hoxe = new Date();
            var visibles = {};
            document.querySelectorAll('.cartel-evento, .card-menor').forEach(function (el) {
                try { var ev = JSON.parse(el.dataset.evento); visibles[ev.titulo + '|' + ev.data] = true; } catch(e) {}
            });
            let lista = eventos.filter(function (e) {
                if (visibles[e.titulo + '|' + e.data]) return false;
                const d = parseDate(e.data);
                return tipo === 'futuros' ? d >= hoxe : d < hoxe;
            }).sort(function (a, b) { return parseDate(a.data) - parseDate(b.data); });

            if (lista.length === 0) {
                container.innerHTML = '<p style="color:var(--cor-texto-mutado);">Non hai eventos ' + (tipo === 'futuros' ? 'futuros' : 'pasados') + '.</p>';
                container.style.display = 'block';
                container.dataset.tipo = tipo;
                return;
            }

            var html = '<div class="actividades-menores-grid">';
            lista.forEach(function (ev) {
                var imgFondo = ev.imaxe ? ' style="background-image:url(\'' + escAttr(ev.imaxe) + '\');background-size:cover;background-position:center;position:relative;"' : '';
                html += '<div class="card-menor" data-evento=\'' + escaparJSON(ev) + '\'' + imgFondo + '>'
                    + (ev.imaxe ? '<div class="card-menor-overlay"></div>' : '')
                    + '<div class="card-menor-contido">'
                    + '<span class="card-menor-data">' + esc(ev.data) + '</span>'
                    + '<h4 class="card-menor-titulo">' + esc(ev.titulo) + '</h4>'
                    + '<p class="card-menor-desc">' + (ev.autor ? 'Por ' + esc(ev.autor) : '') + ' · ' + esc(ev.categoria) + '</p>'
                    + '</div></div>';
            });
            html += '</div>';
            container.innerHTML = html;
            container.style.display = 'block';
            container.dataset.tipo = tipo;
        }

        /* -------------------------------------------------------
           libroTenCategoria(libro, filtro) — comproba se un libro
           coincide cun filtro de categoría, soportando ;
           Ex: libro.categoria = "Novela xuvenil;acoso"
               filtro = "acoso" → true
           ------------------------------------------------------- */
        function libroTenCategoria(libro, filtro) {
            if (!filtro || filtro.trim() === '' || filtro.toLowerCase() === 'todas') return true;
            const cats = (libro.categoria || '').split(';').map(s => s.trim().toLowerCase());
            return cats.some(c => c === filtro.trim().toLowerCase());
        }

        /* -------------------------------------------------------
           xerarCarrusel(secc) → HTML do carrusel de libros
           Admite filtro por categoría (filtro_categoria).
           Se titulo contén "profesor" usa tarxeta horizontal.
           ------------------------------------------------------- */
        function xerarCarrusel(secc) {
            const filtro = secc.filtro_categoria || '';
            let lista = libros.filter(function (l) { return libroTenCategoria(l, filtro); });
            /* filtrar por etiqueta da sección se está definida */
            if (secc.etiqueta && secc.etiqueta.trim() !== '') {
                lista = lista.filter(function (l) { return (l.etiqueta || '') === secc.etiqueta; });
            }
            lista = lista.slice(0, 8);
            if (!lista.length) return '';

            const isProf = secc.titulo && secc.titulo.toLowerCase().includes('profesor');
            const cardClass = isProf ? 'card-libro-profesor' : 'card-libro-netflix';
            const id = 'carrusel-' + (secc.orde || Math.random());

            let html = '<section class="seccion" id="seccion-carrusel"><div class="carrusel-cinta">'
                + '<div class="carrusel-cinta-header">'
                + '<h3>' + (secc.titulo || 'Recomendacións') + ' <span class="badge-cinta">' + lista.length + '</span></h3>'
                + '<div class="carrusel-flechas">'
                + '<button class="carrusel-izq" data-target="' + id + '">‹</button>'
                + '<button class="carrusel-der" data-target="' + id + '">›</button>'
                + '</div></div>'
                + '<div class="carrusel-track" id="' + id + '">';

            lista.forEach(function (lib) {
                var favTxt = lib.favorito_de
                    ? (lib.favorito_de.indexOf(';') > -1
                        ? '<div class="favorito-de"><span style="color:var(--coral);font-weight:600;">⭐ Moi popular!</span></div>'
                        : '<div class="favorito-de">O favorito de ' + esc(lib.favorito_de) + '</div>')
                    : '';
                html += '<div class="' + cardClass + '" data-libro=\'' + escaparJSON(lib) + '\'>'
                    + '<div class="img-wrap"><img src="' + escAttr(lib.imaxe) + '" alt="' + escAttr(lib.titulo) + '" loading="lazy">'
                    + (lib.etiqueta ? '<span class="badge-portada ' + escAttr(lib.etiqueta.toLowerCase()) + '">' + esc(lib.etiqueta) + '</span>' : '')
                    + '</div>'
                    + '<div class="info">'
                    + '<h4>' + esc(lib.titulo) + '</h4>'
                    + '<div class="autor">' + esc(lib.autor) + '</div>'
                    + favTxt
                    + '</div></div>';
            });

            html += '</div></div></section>';
            return html;
        }

        /* -------------------------------------------------------
           escaparJSON(obj) — serializa un obxecto para data-libro
           Escapa comiñas simples para usar en atributo con comiña simple.
           ------------------------------------------------------- */
        function escaparJSON(obj) {
            return JSON.stringify(obj).replace(/'/g, '&#39;');
        }

           xerarLibroMes(secc) → HTML da sección "Libro do Mes"
           Colle o primeiro libro con destacado="SI" ou o primeiro.
           ------------------------------------------------------- */

                + '</div>'
                + '<div class="libro-mes-texto">'
                + '<span class="seccion-meta">' + esc(secc.titulo || 'Lectura Premium do Mes') + '</span>'
                + '<h3>' + esc(libro.titulo) + '</h3>'

                + '</div>'
                + '</div></div></div></section>';
