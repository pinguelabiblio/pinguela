        /* -------------------------------------------------------
           xerarGaleria(secc) → HTML da galería de imaxes
           Usa un layout masonry con CSS columns.
           Imaxes definidas estáticamente (array local).
           ------------------------------------------------------- */
        function xerarGaleria(secc) {
            var imaxes = window._galeriaDatos || [];
            if (!imaxes.length) return '';

            var grupos = {};
            imaxes.forEach(function (img) {
                var dir = img.directorio || 'Xeral';
                if (!grupos[dir]) grupos[dir] = [];
                grupos[dir].push(img);
            });
            var dirs = Object.keys(grupos).sort(function (a, b) {
                var idxA = imaxes.reduce(function (acc, img, i) { return img.directorio === a ? i : acc; }, -1);
                var idxB = imaxes.reduce(function (acc, img, i) { return img.directorio === b ? i : acc; }, -1);
                return idxB - idxA;
            });

            var id = 'galeria-' + (secc.orde || '0');
            var maxIniciais = 4;
            var total = dirs.length;
            var amosar = Math.min(maxIniciais, total);

            var html = '<section class="seccion" id="seccion-galeria">'
                + '<div class="seccion-titulo-liña"><div><span class="seccion-meta">A vida no centro</span><h2>' + (secc.titulo || 'Galería') + '</h2></div></div>'
                + '<div class="galeria-grela" id="' + id + '-grela">';

            for (var i = 0; i < amosar; i++) {
                var d = dirs[i];
                var imgs = grupos[d];
                var portada = imgs[0];
                html += '<div class="galeria-card" data-directorio="' + d + '">'
                    + '<div class="contador">' + imgs.length + ' foto' + (imgs.length !== 1 ? 's' : '') + '</div>'
                    + '<img src="' + portada.url + '" alt="' + d + '" loading="lazy">'
                    + '<div class="legenda"><h4>' + d + '</h4></div>'
                    + '</div>';
            }

            html += '</div>'
                + (total > maxIniciais ? '<div class="galeria-ver-mais"><button onclick="verMaisGaleria(\'' + id + '\', ' + total + ', ' + maxIniciais + ')">Ver máis álbums</button></div>' : '')
                + '</section>';

            return html;
        }

        /* -------------------------------------------------------
           verMaisGaleria() — engade directorios á grella
           ------------------------------------------------------- */
        function verMaisGaleria(id, total, amosados) {
            var grella = document.getElementById(id + '-grela');
            if (!grella) return;
            var btnWrapper = grella.parentElement.querySelector('.galeria-ver-mais');
            var btn = btnWrapper ? btnWrapper.querySelector('button') : null;
            if (!btn) return;

            if (btn.dataset.menos === '1') {
                /* recolher: elimina as tarxetas engadidas */
                while (grella.children.length > amosados) {
                    grella.removeChild(grella.lastChild);
                }
                btn.textContent = 'Ver máis álbums';
                btn.dataset.menos = '0';
                return;
            }

            var imaxes = window._galeriaDatos || [];
            var grupos = {};
            imaxes.forEach(function (img) {
                var dir = img.directorio || 'Xeral';
                if (!grupos[dir]) grupos[dir] = [];
                grupos[dir].push(img);
            });
            var dirs = Object.keys(grupos);
            for (var i = amosados; i < total; i++) {
                var d = dirs[i];
                var imgs = grupos[d];
                var portada = imgs[0];
                if (!portada) break;
                var div = document.createElement('div');
                div.className = 'galeria-card';
                div.dataset.directorio = d;
                div.innerHTML = '<div class="contador">' + imgs.length + ' foto' + (imgs.length !== 1 ? 's' : '') + '</div>'
                    + '<img src="' + portada.url + '" alt="' + d + '" loading="lazy">'
                    + '<div class="legenda"><h4>' + d + '</h4></div>';
                grella.appendChild(div);
            }
            btn.textContent = 'Mostrar menos';
            btn.dataset.menos = '1';
        }

        /* -------------------------------------------------------
           abrirModalGaleria / pecharModalGaleria
           ------------------------------------------------------- */
        function abrirModalGaleria(directorio) {
            var modal = document.getElementById('modal-galeria');
            var grella = document.getElementById('modal-galeria-grela');
            var tituloEl = document.getElementById('modal-galeria-titulo');
            var descEl = document.getElementById('modal-galeria-desc');
            if (!modal || !grella) return;
            var imaxes = window._galeriaDatos || [];
            var filtradas = imaxes.filter(function (img) { return (img.directorio || 'Xeral') === directorio; });
            if (!filtradas.length) return;

            tituloEl.textContent = directorio;
            var albumDesc = filtradas[0].desc || '';
            descEl.textContent = albumDesc || (filtradas.length + ' foto' + (filtradas.length !== 1 ? 's' : ''));

            grella.innerHTML = filtradas.map(function (img) {
                return '<div class="foto-item" data-url="' + escAttr(img.url) + '"><img src="' + escAttr(img.url) + '" alt="" loading="lazy"></div>';
            }).join('');

            modal.classList.add('visible');
            document.body.style.overflow = 'hidden';

            /* clic en foto → lightbox */
            grella.querySelectorAll('.foto-item').forEach(function (el) {
                el.addEventListener('click', function () { abrirLightbox(this.dataset.url); });
            });
        }

        function pecharModalGaleria() {
            var modal = document.getElementById('modal-galeria');
            if (!modal) return;
            modal.classList.remove('visible');
            document.body.style.overflow = '';
        }

        /* -------------------------------------------------------
           abrirLightbox / pecharLightbox
           ------------------------------------------------------- */
        function abrirLightbox(url) {
            var lb = document.getElementById('lightbox');
            var img = document.getElementById('lightbox-img');
            if (!lb || !img) return;
            img.src = url;
            lb.classList.add('visible');
            document.body.style.overflow = 'hidden';
        }

        function pecharLightbox() {
            var lb = document.getElementById('lightbox');
            if (!lb) return;
            lb.classList.remove('visible');
            document.body.style.overflow = '';
        }

        /* -------------------------------------------------------
           xerarPreferidos(secc) — carrusel de libros favoritos
           con filtro despregable: todos/profes/alumnos/familias
           ------------------------------------------------------- */
        function formatarListaNomes(lista) {
            if (lista.length === 1) return lista[0];
            var copia = lista.slice();
            var ult = copia.pop();
            return copia.join(', ') + ' e ' + ult;
        }

        function eFeminino(raw) {
            return (/^(Profesora\s|Alumna\s|Convidada\s|Nai\s)/i).test(raw);
        }

        function montarTextoGrupo(grupo, entradas) {
            var todosFem = entradas.every(function (e) { return eFeminino(e.raw); });
            var plural = entradas.length > 1;
            var nomes = entradas.map(function (e) { return e.nome; });
            var textoNomes = formatarListaNomes(nomes);
            switch (grupo) {
                case 'Profesores':
                    if (plural) return 'dos profesores ' + textoNomes;
                    return (todosFem ? 'da profesora ' : 'do profesor ') + textoNomes;
                case 'Alumnado':
                    if (plural) return 'dos alumnos ' + textoNomes;
                    return (todosFem ? 'da alumna ' : 'do alumno ') + textoNomes;
                case 'Convidados':
                    if (plural) return 'dos convidados ' + textoNomes;
                    return (todosFem ? 'da convidada ' : 'do convidado ') + textoNomes;
                case 'Familiares':
                    if (plural) return 'dos familiares: ' + textoNomes;
                    return 'do familiar ' + textoNomes;
                default:
                    return 'de ' + textoNomes;
            }
        }

        function formatearFavoritos(favorito_de) {
            if (!favorito_de) return '';
            var favs = favorito_de.split(';').map(function (f) { return f.trim(); }).filter(function (f) { return f; });
            if (!favs.length) return '';
            var entradas = favs.map(function (f) {
                return { grupo: favoritoGrupo(f), nome: f.replace(/^(Prof\.\s|Profesor\s|Profesora\s|Alumno\s|Alumna\s|Convidado\s|Convidada\s|Familiar\s|Pai\s|Nai\s)/i, ''), raw: f };
            });
            var grupos = {};
            entradas.forEach(function (e) {
                if (!grupos[e.grupo]) grupos[e.grupo] = [];
                grupos[e.grupo].push(e);
            });
            var keys = Object.keys(grupos).sort();
            var partes = keys.map(function (g) { return montarTextoGrupo(g, grupos[g]); });
            if (partes.length === 1) return '⭐ Este libro está nos favoritos ' + partes[0];
            var ult = partes.pop();
            return '⭐ Este libro está nos favoritos ' + partes.join('; ') + '; e ' + ult;
        }

        function favoritoGrupo(valor) {
            var v = valor.trim().toLowerCase();
            if (v.indexOf('prof.') === 0 || v.indexOf('profesor') === 0) return 'Profesores';
            if (v.indexOf('alum') === 0) return 'Alumnado';
            if (v.indexOf('pai ') === 0 || v.indexOf('nai ') === 0 || v.indexOf('familiar') === 0) return 'Familiares';
            if (v.indexOf('convid') === 0) return 'Convidados';
            return 'Outros';
        }

        function xerarPreferidos(secc) {
            var favoritos = libros.filter(function (l) { return l.favorito_de && l.favorito_de.trim() !== ''; });
            if (!favoritos.length) return '';

            var id = 'carrusel-preferidos-' + (secc.orde || '0');
            var grupos = {};
            favoritos.forEach(function (l) {
                var entradas = l.favorito_de.split(';').map(function (f) { return f.trim(); }).filter(function (f) { return f; });
                if (!entradas.length) entradas = [l.favorito_de];
                var gruposVistos = {};
                entradas.forEach(function (ent) {
                    var g = favoritoGrupo(ent);
                    if (!gruposVistos[g]) {
                        gruposVistos[g] = true;
                        if (!grupos[g]) grupos[g] = [];
                        grupos[g].push(l);
                    }
                });
            });

            var html = '<section class="seccion" id="seccion-preferidos">'
                + '<div class="seccion-titulo-liña"><div><span class="seccion-meta">Os nosos favoritos</span><h2>' + (secc.titulo || 'Preferidos') + '</h2></div>'
                + '<div class="filtro-preferidos">'
                + '<label>Filtrar:</label>'
                + '<select id="filtro-favorito" data-target="' + id + '">'
                + '<option value="todas">Todos</option>';
            Object.keys(grupos).sort().forEach(function (g) {
                html += '<option value="' + escAttr(g) + '">' + esc(g) + '</option>';
            });
            html += '</select></div></div>'
                + '<div class="carrusel-cinta carrusel-cinta-dobre" data-target="' + id + '"><div class="carrusel-cinta-header">'
                + '<h3>' + favoritos.length + ' favoritos</h3>'
                + '<div class="carrusel-flechas">'
                + '<button class="carrusel-izq" data-target="' + id + '">‹</button>'
                + '<button class="carrusel-der" data-target="' + id + '">›</button>'
                + '</div></div>'
                + '<div class="carrusel-track" id="' + id + '" style="display:grid;grid-auto-flow:column;grid-template-rows:repeat(2,auto);overflow-x:auto;gap:12px;padding:4px 0;scroll-snap-type:x mandatory;">';

            favoritos.forEach(function (lib) {
                var multicomp = (lib.favorito_de || '').indexOf(';') > -1;
                var favText;
                if (multicomp) {
                    favText = '<span style="color:var(--coral);font-weight:600;">⭐ Moi popular!</span>';
                } else {
                    var nome = lib.favorito_de.replace(/^(Prof\.\s|Profesor\s|Profesora\s|Alumno\s|Alumna\s|Convidado\s|Convidada\s|Familiar\s|Pai\s|Nai\s)/i, '');
                    var g = favoritoGrupo(lib.favorito_de);
                    favText = 'O favorito de <span class="nome-persoa">' + esc(nome) + '</span> <span class="grupo-badge badge-' + escAttr(g.toLowerCase()) + '">' + esc(g) + '</span>';
                }
                html += '<div class="card-preferido" data-favorito="' + escAttr(multicomp ? 'todas' : favoritoGrupo(lib.favorito_de)) + '" data-libro=\'' + escaparJSON(lib) + '\'>'
                    + '<div class="img-wrap"><img src="' + escAttr(lib.imaxe) + '" alt="' + escAttr(lib.titulo) + '" loading="lazy"></div>'
                    + '<div class="info">'
                    + '<h4>' + esc(lib.titulo) + '</h4>'
                    + '<div class="autor">' + esc(lib.autor) + '</div>'
                    + '<div class="favorito-de">' + favText + '</div>'
                    + '</div>'
                    + (lib.etiqueta ? '<span class="badge-portada ' + escAttr(lib.etiqueta.toLowerCase()) + '">' + esc(lib.etiqueta) + '</span>' : '')
                    + '</div>';
            });

            html += '</div></div></section>';
            return html;
        }

        /* -------------------------------------------------------
           inicializarAcordeon() — engade eventos ás cabeceiras
           Abre/pecha o acordeón cun único elemento á vez.
           ------------------------------------------------------- */
        function inicializarAcordeon() {
            document.querySelectorAll('.acordeon-cabeceira').forEach(function (h) {
                h.addEventListener('click', function () {
                    const item = this.parentElement;
                    const contido = item.querySelector('.acordeon-contido');
                    if (item.classList.contains('aberto')) {
                        item.classList.remove('aberto');
                        contido.style.maxHeight = '0';
                    } else {
                        document.querySelectorAll('.acordeon-item').forEach(function (i) {
                            i.classList.remove('aberto');
                            i.querySelector('.acordeon-contido').style.maxHeight = '0';
                        });
                        item.classList.add('aberto');
                        contido.style.maxHeight = contido.scrollHeight + 'px';
                    }
                });
            });
        }

        /* -------------------------------------------------------
           inicializarDragSliders() — arrastre nos carruseles
           + botóns de desprazamento lateral
           + clic nas tarxetas → abrir modal co data-libro
           ------------------------------------------------------- */
        function inicializarDragSliders() {
            if (!window._dragSlidersInit) {
                window._dragSlidersInit = true;
                window._ds = { isDown: false, startX: 0, scrollLeft: 0, trackAtual: null };
                var s = window._ds;
                window.addEventListener('mouseup', function () { if (s.trackAtual) { s.isDown = false; s.trackAtual.style.cursor = 'grab'; s.trackAtual = null; } });
                window.addEventListener('touchend', function () { if (s.trackAtual) { s.isDown = false; s.trackAtual.style.cursor = 'grab'; s.trackAtual = null; } }, { passive: true });
                window.addEventListener('mousemove', function (e) {
                    if (!s.isDown || !s.trackAtual) return;
                    var x = e.pageX - s.trackAtual.offsetLeft;
                    s.trackAtual.scrollLeft = s.scrollLeft - (x - s.startX) * 1.5;
                    e.preventDefault();
                });
                document.addEventListener('mousedown', function (e) {
                    var track = e.target.closest('.carrusel-track');
                    if (!track) return;
                    s.isDown = true;
                    s.trackAtual = track;
                    track.style.cursor = 'grabbing';
                    s.startX = e.pageX - track.offsetLeft;
                    s.scrollLeft = track.scrollLeft;
                    e.preventDefault();
                });
            }
            document.querySelectorAll('.carrusel-izq, .carrusel-der').forEach(function (btn) {
                if (btn.dataset.dsInit) return;
                btn.dataset.dsInit = '1';
                btn.addEventListener('click', function () {
                    const track = document.getElementById(this.dataset.target);
                    if (!track) return;
                    var paxinas = track.querySelectorAll(':scope > .carrusel-paxina');
                    if (paxinas.length) {
                        var activa = track.querySelector(':scope > .carrusel-paxina.activa');
                        var idx = Array.prototype.indexOf.call(paxinas, activa);
                        var dir = this.classList.contains('carrusel-izq') ? -1 : 1;
                        var nova = idx + dir;
                        if (nova < 0 || nova >= paxinas.length) return;
                        activa.classList.remove('activa');
                        paxinas[nova].classList.add('activa');
                    } else {
                        const delta = this.classList.contains('carrusel-izq') ? -300 : 300;
                        track.scrollBy({ left: delta, behavior: 'smooth' });
                    }
                });
            });
            document.querySelectorAll('.card-libro-netflix, .card-libro-profesor, .card-preferido').forEach(function (card) {
                if (card.dataset.dsInit) return;
                card.dataset.dsInit = '1';
                card.addEventListener('click', function () {
                    const data = this.dataset.libro;
                    if (data) try { abrirModal(JSON.parse(data)); } catch (e) { }
                });
            });
            document.querySelectorAll('.cartel-evento, .card-menor').forEach(function (card) {
                if (card.dataset.dsInit) return;
                card.dataset.dsInit = '1';
                card.addEventListener('click', function () {
                    const data = this.dataset.evento;
                    if (data) try { abrirModalEvento(JSON.parse(data)); } catch (e) { }
                });
            });
        }

        /* -------------------------------------------------------
           inicializarModal() — rexistra eventos do modal
           Peche: botón ×, clic no overlay, tecla Escape
           ------------------------------------------------------- */
        function inicializarModal() {
            var pechar = document.getElementById('modal-pechar');
            if (pechar && !pechar.dataset._ligado) { pechar.addEventListener('click', pecharModal); pechar.dataset._ligado = '1'; }
            var overlay = document.getElementById('modal-libro');
            if (overlay && !overlay.dataset._ligado) { overlay.addEventListener('click', function (e) { if (e.target === e.currentTarget) pecharModal(); }); overlay.dataset._ligado = '1'; }
            /* Escape unificado engádese unha soa vez en inicializarFiltros() */

            /* Modal programa */
            var pp = document.getElementById('modal-programa-pechar');
            if (pp && !pp.dataset._ligado) { pp.addEventListener('click', pecharModalPrograma); pp.dataset._ligado = '1'; }
            var po = document.getElementById('modal-programa');
            if (po && !po.dataset._ligado) { po.addEventListener('click', function (e) { if (e.target === e.currentTarget) pecharModalPrograma(); }); po.dataset._ligado = '1'; }
            if (!document.body.dataset._progAberto) {
                document.addEventListener('click', function (e) {
                    var btn = e.target.closest('.efemeride-ver-mais');
                    if (btn && btn.dataset.programa) abrirModalPrograma(btn.dataset.programa, btn.dataset.titulo);
                });
                document.body.dataset._progAberto = '1';
            }
        }

        /* -------------------------------------------------------
           abrirModalPrograma(contenido, titulo) — modal do programa
           Insire o contido con innerHTML (permite <br>, negriñas).
           O título personalizable ven de efemeride_programa_titulo.
           ------------------------------------------------------- */
        function abrirModalPrograma(contenido, titulo) {
            var modal = document.getElementById('modal-programa');
            var body = document.getElementById('modal-programa-contido');
            var tituloEl = document.getElementById('modal-programa-titulo');
            if (!modal || !body) return;
            body.innerHTML = contenido;
            if (tituloEl) tituloEl.textContent = titulo || 'Programa de actividades';
            modal.classList.add('visible');
            document.body.style.overflow = 'hidden';
        }

        function pecharModalPrograma() {
            var modal = document.getElementById('modal-programa');
            if (!modal) return;
            modal.classList.remove('visible');
            document.body.style.overflow = '';
        }

        /* -------------------------------------------------------
           inicializarLightbox() — eventos para abrir/pechar
           lightbox da galería.
           ------------------------------------------------------- */
        function inicializarLightbox() {
            var lb = document.getElementById('lightbox');
            var pechar = document.getElementById('lightbox-pechar');
            if (!lb) return;
            if (pechar) pechar.addEventListener('click', function (e) { e.stopPropagation(); pecharLightbox(); });
            lb.addEventListener('click', function (e) { if (e.target === e.currentTarget) pecharLightbox(); });
            /* Escape manexado polo listener global en inicializarFiltros() */
            /* ligar clic nas cards da galería → abre modal de directorio */
            document.addEventListener('click', function (e) {
                var card = e.target.closest('.galeria-card[data-directorio]');
                if (card) abrirModalGaleria(card.dataset.directorio);
            });
            /* pechar modal de galería */
            var mg = document.getElementById('modal-galeria');
            if (mg) {
                var mgPechar = document.getElementById('modal-galeria-pechar');
                if (mgPechar) mgPechar.addEventListener('click', pecharModalGaleria);
                mg.addEventListener('click', function (e) { if (e.target === e.currentTarget) pecharModalGaleria(); });
            }
        }

        /* -------------------------------------------------------
           inicializarFiltros() — eventos para botóns de filtro
           e selector de preferidos.
           ------------------------------------------------------- */
        function inicializarFiltros() {
            document.querySelectorAll('.filtro-botons').forEach(function (grupoDiv) {
                var btns = grupoDiv.querySelectorAll('button');
                btns.forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var grupo = this.closest('.filtro-botons').dataset.grupo;
                        var filtro = this.dataset.filtro;
                        var grupoBotoes = document.querySelectorAll('.filtro-botons[data-grupo="' + grupo + '"] button');
                        var seccion = this.closest('.seccion');
                        var carruseles = seccion ? seccion.querySelectorAll('.carrusel-filtrado') : document.querySelectorAll('.carrusel-filtrado');
                        var isActive = this.classList.contains('activo');
                        if (isActive) {
                            this.classList.remove('activo');
                            carruseles.forEach(function (c) { c.classList.remove('visible'); });
                        } else {
                            grupoBotoes.forEach(function (b) { b.classList.remove('activo'); });
                            this.classList.add('activo');
                            carruseles.forEach(function (c) {
                                c.classList.remove('visible');
                                if (c.dataset.filtro === filtro) c.classList.add('visible');
                            });
                        }
                    });
                });

            });

            var sel = document.getElementById('filtro-favorito');
            if (sel) {
                sel.addEventListener('change', function () {
                    var val = this.value;
                    var track = document.getElementById(this.dataset.target);
                    if (!track) return;
                    var cards = track.querySelectorAll('.card-preferido');
                    cards.forEach(function (card) {
                        if (val === 'todas') {
                            card.style.display = '';
                        } else {
                            card.style.display = (card.dataset.favorito === val || card.dataset.favorito === 'todas') ? '' : 'none';
                        }
                    });
                });
            }

            document.querySelectorAll('.btn-toggle-eventos').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    toggleEventos(this.dataset.tipo, this);
                });
            });

            /* Escape global unificado — pecha calquera overlay visible */
            if (!document.body.dataset._escapeGlobal) {
                document.addEventListener('keydown', function (e) {
                    if (e.key !== 'Escape') return;
                    var lb = document.getElementById('lightbox');
                    if (lb && lb.classList.contains('visible')) { pecharLightbox(); return; }
                    var prog = document.getElementById('modal-programa');
                    if (prog && prog.classList.contains('visible')) { pecharModalPrograma(); return; }
                    var lib = document.getElementById('modal-libro');
                    if (lib && lib.classList.contains('visible')) { pecharModal(); return; }
                    var bus = document.getElementById('buscador-overlay');
                    if (bus && bus.classList.contains('visible')) { pecharBuscador(); return; }
                });
                document.body.dataset._escapeGlobal = '1';
            }
        }

        /* -------------------------------------------------------
           inicializarBuscador() — busca en libros por título, autor, categoría
           ------------------------------------------------------- */
        function inicializarBuscador() {
            var btn = document.getElementById('btn-buscar');
            var overlay = document.getElementById('buscador-overlay');
            var input = document.getElementById('buscador-input');
            var resultados = document.getElementById('buscador-resultados');
            var pechar = document.getElementById('buscador-pechar');
            if (!btn || !overlay) return;

            window.pecharBuscador = function () {
                overlay.classList.remove('visible');
                input.value = '';
                if (resultados) resultados.innerHTML = '';
            };

            function buscar() {
                var q = input.value.trim().toLowerCase();
                var qEsc = esc(input.value.trim());
                if (!q || !libros || !libros.length) {
                    resultados.innerHTML = q ? '<div class="buscador-baleiro">Non se atoparon resultados</div>' : '<div class="buscador-aviso">Escribe para buscar...</div>';
                    return;
                }
                var hits = libros.filter(function (l) {
                    return (l.titulo || '').toLowerCase().indexOf(q) > -1
                        || (l.autor || '').toLowerCase().indexOf(q) > -1
                        || (l.categoria || '').toLowerCase().indexOf(q) > -1;
                });
                if (!hits.length) {
                    resultados.innerHTML = '<div class="buscador-baleiro">Non se atoparon resultados para "' + qEsc + '"</div>';
                    return;
                }
                resultados.innerHTML = hits.map(function (l) {
                    return '<div class="resultado-item" data-libro=\'' + escaparJSON(l) + '\'>'
                        + (l.imaxe ? '<img src="' + escAttr(l.imaxe) + '" alt="' + escAttr(l.titulo) + '" loading="lazy">' : '<div style="width:40px;height:56px;background:var(--bg-principal);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--cor-texto-mutado);font-size:16px;"><i class="fas fa-book"></i></div>')
                        + '<div class="resultado-info">'
                        + '<h4>' + esc(l.titulo) + '</h4>'
                        + '<span>' + esc(l.autor || '') + '</span>'
                        + (l.categoria ? '<div class="resultado-cat">' + esc(l.categoria) + '</div>' : '')
                        + '</div></div>';
                }).join('');
                resultados.querySelectorAll('.resultado-item').forEach(function (el) {
                    el.addEventListener('click', function () {
                        var lib = JSON.parse(this.dataset.libro);
                        pecharBuscador();
                        abrirModal(lib);
                    });
                });
            }

            btn.addEventListener('click', function () {
                overlay.classList.add('visible');
                setTimeout(function () { input.focus(); }, 100);
                buscar();
            });
            pechar.addEventListener('click', pecharBuscador);
            overlay.addEventListener('click', function (e) { if (e.target === e.currentTarget) pecharBuscador(); });
            var debounceTimer;
            input.addEventListener('input', function () {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(buscar, 250);
            });
        }

        /* -------------------------------------------------------
           abrirModal(libro) — mostra o modal cos datos do libro
           Constrúe o HTML dinamicamente: imaxe, título, autor...
           ------------------------------------------------------- */
        function abrirModal(libro) {
            const overlay = document.getElementById('modal-libro');
            const body = document.getElementById('modal-body');
            if (!overlay || !body) return;

            var favoritosHtml = '';
            var favTexto = formatearFavoritos(libro.favorito_de);
            if (favTexto) {
                favoritosHtml = '<div class="modal-favoritos"><span class="chip-fav">' + favTexto + '</span></div>';
            }

            var citaHtml = libro.cita ? '<div class="modal-cita">' + esc(libro.cita) + '</div>' : '';

            let html = '<div class="modal-superior">'
                + '<div class="modal-img-wrap">'
                + (libro.imaxe ? '<img src="' + escAttr(libro.imaxe) + '" alt="' + escAttr(libro.titulo || '') + '">' : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-principal);color:var(--cor-texto-mutado);font-size:48px;"><i class="fas fa-book"></i></div>')
                + '</div>'
                + '<div class="modal-texto">'
                + (libro.titulo ? '<h2 class="modal-titulo">' + esc(libro.titulo) + '</h2>' : '')
                + (libro.autor ? '<p class="modal-autor">' + esc(libro.autor) + '</p>' : '')
                + citaHtml
                + (libro.descricion ? '<p class="modal-desc">' + esc(libro.descricion) + '</p>' : '')
                + '</div>'
                + '</div>';
            let meta = '';
            if (libro.categoria) meta += '<span><strong>Categoría:</strong> ' + esc(libro.categoria.replace(/;/g, ', ')) + '</span>';
            if (libro.nivel) meta += '<span><strong>Nivel:</strong> ' + esc(libro.nivel) + '</span>';
            if (libro.etiqueta) meta += '<span><strong>Etiqueta:</strong> ' + esc(libro.etiqueta) + '</span>';
            if (libro.disponible) meta += '<span><strong>Dispoñible:</strong> ' + esc(libro.disponible === 'NON' ? 'Inda non' : libro.disponible) + '</span>';
            if (libro.link && libro.link !== '#') meta += '<span><a href="' + escAttr(libro.link) + '" target="_blank" style="color:var(--primaria);">Máis info →</a></span>';
            html += favoritosHtml;
            if (meta) html += '<div class="modal-meta">' + meta + '</div>';
            body.innerHTML = html;
            overlay.classList.add('visible');
            document.body.style.overflow = 'hidden';
        }

        /* -------------------------------------------------------
           pecharModal() — oculta o overlay e restaura o scroll
           ------------------------------------------------------- */
        function pecharModal() {
            const overlay = document.getElementById('modal-libro');
            if (overlay) { overlay.classList.remove('visible'); document.body.style.overflow = ''; }
        }

        function abrirModalEvento(ev) {
            const overlay = document.getElementById('modal-libro');
            const body = document.getElementById('modal-body');
            if (!overlay || !body) return;
            var html = '<div class="modal-superior">'
                + '<div class="modal-img-wrap">'
                + (ev.imaxe ? '<img src="' + escAttr(ev.imaxe) + '" alt="' + escAttr(ev.titulo || '') + '">' : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-principal);color:var(--cor-texto-mutado);font-size:48px;"><i class="fas fa-calendar-alt"></i></div>')
                + '</div>'
                + '<div class="modal-texto">'
                + (ev.titulo ? '<h2 class="modal-titulo">' + esc(ev.titulo) + '</h2>' : '')
                + (ev.autor ? '<p class="modal-autor">' + esc(ev.autor) + '</p>' : '')
                + (ev.data || ev.hora ? '<p style="color:var(--cor-texto-mutado);margin-bottom:8px;">' + esc(ev.data || '') + (ev.hora ? ' · ' + esc(ev.hora) : '') + '</p>' : '')
                + (ev.descricion ? '<p class="modal-desc">' + esc(ev.descricion) + '</p>' : '')
                + '</div>'
                + '</div>';
            html += '<div class="modal-meta"><span><strong>Categoría:</strong> ' + esc(ev.categoria || '') + '</span></div>';
            body.innerHTML = html;
            overlay.classList.add('visible');
            document.body.style.overflow = 'hidden';
        }

        /* -------------------------------------------------------
           ARRANQUE — carga os datos cando o DOM está listo
           ------------------------------------------------------- */
        window.addEventListener('DOMContentLoaded', cargarDatos);
    </script>
</body>

</html>
